services:
  fizzbuzz:
    build:
      context: .
      dockerfile: Dockerfile
    image: fizzbuzz:latest
    container_name: fizzbuzz
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
      Keycloak__Authority: "http://localhost:8081/realms/fizzbuzz"
      Keycloak__MetadataAddress: "http://keycloak:8080/realms/fizzbuzz/.well-known/openid-configuration"
      Keycloak__Audience: "fizzbuzz-api"
      Keycloak__RequireHttpsMetadata: "false"
      Keycloak__AuthorizationUrl: "http://localhost:8081/realms/fizzbuzz/protocol/openid-connect/auth"
      Keycloak__TokenUrl: "http://localhost:8081/realms/fizzbuzz/protocol/openid-connect/token"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
      keycloak:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fizzbuzz-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Oberservability ---------------------------------------------------------

  # Collector : fan-out to Aspire and Grafana.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: fizzbuzz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - aspire-dashboard
      - tempo
      - loki
    restart: unless-stopped

  # Aspire: http://localhost:18888
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: fizzbuzz-aspire
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
    restart: unless-stopped

  # Grafana: http://localhost:3000
  grafana:
    image: grafana/grafana:11.6.0
    container_name: fizzbuzz-grafana
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:3000"
      # SSO via Keycloak (OIDC). Only fizzbuzz.admin gets a real role (Grafana Admin);
      # everyone else is mapped to the built-in "None" role: they are signed in (so the
      # "Sign out" button works) but have no access to any dashboard.
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OAUTH_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid email profile roles"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://localhost:8081/realms/fizzbuzz/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://keycloak:8080/realms/fizzbuzz/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://keycloak:8080/realms/fizzbuzz/protocol/openid-connect/userinfo"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_access.roles[*], 'fizzbuzz.admin') && 'Admin' || 'None'"
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_OAUTH_AUTO_LOGIN: "true"
      # RP-initiated logout: signing out of Grafana also ends the Keycloak SSO session,
      # so the next sign-in really asks for credentials again (no silent re-login).
      GF_AUTH_SIGNOUT_REDIRECT_URL: "http://localhost:8081/realms/fizzbuzz/protocol/openid-connect/logout?client_id=grafana&post_logout_redirect_uri=http%3A%2F%2Flocalhost%3A3000%2Flogin"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
      - keycloak
    restart: unless-stopped

  # Keycloak identity provider: http://localhost:8081 (admin console at /admin)
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: fizzbuzz-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Public (browser-facing) base URL; this is the issuer baked into tokens.
      KC_HOSTNAME: "http://localhost:8081"
      # Let backchannel callers (the API, Grafana) reach Keycloak by the host they
      # actually used (keycloak:8080) while keeping the public issuer above.
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    restart: unless-stopped

  # Traces
  tempo:
    image: grafana/tempo:latest
    container_name: fizzbuzz-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  # Logs
  loki:
    image: grafana/loki:latest
    container_name: fizzbuzz-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  # Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: fizzbuzz-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

volumes:
  redis-data:
  tempo-data:
  loki-data:
  prometheus-data:
