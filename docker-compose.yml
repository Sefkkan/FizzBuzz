services:
  fizzbuzz:
    build:
      context: .
      dockerfile: Dockerfile
    image: fizzbuzz:latest
    container_name: fizzbuzz
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD}"
      OpenTelemetry__OtlpEndpoint: "http://otel-collector:4317"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fizzbuzz-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Oberservability ---------------------------------------------------------

  # Collector : fan-out to Aspire and Grafana.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: fizzbuzz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    depends_on:
      - aspire-dashboard
      - tempo
      - loki
    restart: unless-stopped

  # Aspire: http://localhost:18888
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: fizzbuzz-aspire
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "18888:18888"
    restart: unless-stopped

  # Grafana: http://localhost:3000
  grafana:
    image: grafana/grafana:11.6.0
    container_name: fizzbuzz-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped

  # Traces
  tempo:
    image: grafana/tempo:latest
    container_name: fizzbuzz-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    restart: unless-stopped

  # Logs
  loki:
    image: grafana/loki:latest
    container_name: fizzbuzz-loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - loki-data:/loki
    restart: unless-stopped

  # Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: fizzbuzz-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

volumes:
  redis-data:
  tempo-data:
  loki-data:
  prometheus-data:
